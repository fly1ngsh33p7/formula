<link rel="stylesheet" href="./index.css" />
<canvas id="game" width="800" height="800"></canvas>
<label for="show-axis-lines" class="control-label">
	<input id="show-axis-lines" type="checkbox" checked />
	Show axis lines
</label>
<section id="spawn-cube-section" class="section">
	<h2 class="section-title">Spawn Cube</h2>
	<form id="spawn-cube-form">
		<label>
			Size
			<input id="spawn-cube-size" type="number" step="0.1" value="0.5" />
		</label>
		<label>
			X coordinate
			<input id="spawn-cube-x" type="number" step="0.1" value="0" />
		</label>
		<label>
			Y coordinate
			<input id="spawn-cube-y" type="number" step="0.1" value="0" />
		</label>
		<label>
			Z coordinate
			<input id="spawn-cube-z" type="number" step="0.1" value="1" />
		</label>
		<label>
			Move speed per frame X
			<input id="spawn-cube-speed-x" type="number" step="0.0001" value="0" />
		</label>
		<label>
			Move speed per frame Y
			<input id="spawn-cube-speed-y" type="number" step="0.0001" value="0" />
		</label>
		<label>
			Move speed per frame Z
			<input id="spawn-cube-speed-z" type="number" step="0.0001" value="0" />
		</label>
		<button type="submit">Spawn Cube</button>
	</form>
</section>
<section id="loaded-objects-section" class="section">
	<h2 class="section-title">Loaded Objects (sorted by distance to 0/0/0)</h2>
	<ul id="loaded-objects-list"></ul>
</section>
<script type="module" src="./index.js"></script>
